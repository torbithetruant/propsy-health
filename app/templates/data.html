<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Health Data - Propsy Health</title>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="page-gradient">
    <div class="container-wide">
        <div class="card">
            <h1>My Health Data</h1>
            <p class="subtitle">View your daily health data from Google Health</p>
            
            <div class="date-picker-section">
                <label for="date-picker" style="font-weight: 600;">📅 Select a date:</label>
                <input type="date" id="date-picker" style="width: auto; flex: 1; min-width: 150px;" />
                <button class="btn btn-primary" id="fetch-btn" onclick="fetchHealthData()">Fetch Data</button>
                <span id="source-indicator"></span>
            </div>
            
            <div id="content-area">
                <div class="text-center" style="padding: 40px; color: #666;">
                    <p style="font-size: 3rem;">📊</p>
                    <p>Select a date and click "Fetch Data" to view your health metrics.</p>
                </div>
            </div>
            
            <div class="mt-24">
                <a href="/dashboard" class="btn btn-secondary">← Back to Dashboard</a>
            </div>
        </div>
    </div>

    <script>
        // Initialize date picker with today's date
        const datePicker = document.getElementById('date-picker');
        const today = new Date();
        datePicker.value = today.toISOString().split('T')[0];
        
        // Auto-fetch on page load
        fetchHealthData();
        
        async function fetchHealthData() {
            const date = datePicker.value;
            if (!date) return alert('Please select a date');
            
            const contentArea = document.getElementById('content-area');
            const fetchBtn = document.getElementById('fetch-btn');
            const sourceIndicator = document.getElementById('source-indicator');
            
            fetchBtn.disabled = true;
            sourceIndicator.innerHTML = '';
            contentArea.innerHTML = `<div class="text-center" style="padding: 40px;"><p>Fetching health data for <strong>${date}</strong>...</p></div>`;
            
            try {
                const response = await fetch(`/api/health-data/${date}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const result = await response.json();
                renderHealthData(result, date);
            } catch (error) {
                contentArea.innerHTML = `<div class="error-box"><strong>❌ Error:</strong> ${error.message}</div>`;
            } finally {
                fetchBtn.disabled = false;
            }
        }
        
        function renderHealthData(result, date) {
            const contentArea = document.getElementById('content-area');
            const sourceIndicator = document.getElementById('source-indicator');
            const data = result.data;
            const source = result.source;
            
            const sourceLabel = source === 'database' ? '⚡ From Cache' : '🌐 From Google API';
            const badgeClass = source === 'database' ? 'badge-success' : 'badge-primary';
            sourceIndicator.innerHTML = `<span class="badge ${badgeClass}">${sourceLabel}</span>`;
            
            const hasData = data.steps > 0 || data.calories > 0 || data.sleep_duration > 0;
            
            if (!hasData) {
                contentArea.innerHTML = `<div class="text-center" style="padding: 40px; color: #666;"><p style="font-size: 3rem;">😴</p><p>No health data available for <strong>${date}</strong>.</p></div>`;
                return;
            }
            
            contentArea.innerHTML = `
                <div class="data-grid">
                    <div class="card-flat">
                        <h2>🏃 Activity</h2>
                        ${renderMetric('Steps', data.steps, 'steps')}
                        ${renderMetric('Calories', data.calories, 'kcal')}
                        ${renderMetric('Wear Time', formatMinutes(data.wear_time), '')}
                    </div>
                    <div class="card-flat">
                        <h2>❤️ Heart Rate</h2>
                        ${renderMetric('Average HR', data.avg_hr, 'bpm')}
                        ${renderMetric('Max HR', data.max_hr, 'bpm')}
                        ${renderMetric('Resting HR', data.resting_hr, 'bpm')}
                    </div>
                    <div class="card-flat">
                        <h2>😴 Sleep</h2>
                        ${renderMetric('Duration', formatMinutes(data.sleep_duration), '')}
                        ${renderMetric('Deep Sleep', formatMinutes(data.deep_sleep), '')}
                        ${renderMetric('Light Sleep', formatMinutes(data.light_sleep), '')}
                        ${renderMetric('REM Sleep', formatMinutes(data.rem_sleep), '')}
                        ${renderMetric('Efficiency', data.sleep_efficiency !== null ? data.sleep_efficiency + '%' : null, '')}
                    </div>
                </div>
            `;
        }
        
        function renderMetric(label, value, unit) {
            const displayValue = value === null || value === undefined 
                ? '<span class="metric-value" style="color:#9ca3af; font-style:italic; font-weight:normal;">No data</span>'
                : `<span class="metric-value">${value}${unit ? ' ' + unit : ''}</span>`;
            return `<div class="metric"><span class="metric-label">${label}</span>${displayValue}</div>`;
        }
        
        function formatMinutes(minutes) {
            if (minutes === null || minutes === undefined) return null;
            if (minutes < 60) return `${minutes} min`;
            const h = Math.floor(minutes / 60);
            const m = minutes % 60;
            return m > 0 ? `${h}h ${m}m` : `${h}h`;
        }
    </script>
</body>
</html>
