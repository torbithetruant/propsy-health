<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Health Data - Propsy Health</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #333; margin-bottom: 8px; }
        .subtitle { color: #666; margin-bottom: 32px; }
        
        /* Date Picker Section */
        .date-picker-section {
            background: #f8fafc;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .date-picker-section label {
            font-weight: 600;
            color: #333;
        }
        input[type="date"] {
            padding: 10px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        input[type="date"]:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }
        .btn:hover { background: #556cd6; }
        .btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: #6b7280;
        }
        .btn-secondary:hover { background: #4b5563; }
        
        /* Source Badge */
        .source-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-left: 12px;
        }
        .source-badge.database {
            background: #d1fae5;
            color: #065f46;
        }
        .source-badge.api {
            background: #dbeafe;
            color: #1e40af;
        }
        
        /* Loading State */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Error State */
        .error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 16px;
            color: #991b1b;
            margin-bottom: 24px;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }
        
        /* Data Sections */
        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        .data-section {
            background: #f8fafc;
            border-radius: 12px;
            padding: 24px;
        }
        .data-section h2 {
            color: #333;
            margin-bottom: 16px;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .metric {
            background: white;
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .metric-label {
            color: #666;
            font-size: 0.875rem;
            font-weight: 500;
        }
        .metric-value {
            color: #333;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: monospace;
        }
        .metric-value.empty {
            color: #9ca3af;
            font-style: italic;
            font-weight: normal;
        }
        
        /* Collapsible Raw Data */
        .raw-section {
            background: #f8fafc;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .raw-section summary {
            cursor: pointer;
            font-weight: 600;
            color: #333;
            font-size: 1.1rem;
            user-select: none;
            padding: 8px 0;
        }
        .raw-section summary:hover {
            color: #667eea;
        }
        .raw-section[open] summary {
            margin-bottom: 16px;
        }
        pre {
            background: #1e1e2e;
            color: #fff;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 0.8rem;
            max-height: 400px;
            overflow-y: auto;
        }
        
        /* Navigation */
        .nav-footer {
            margin-top: 32px;
            display: flex;
            gap: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>My Health Data</h1>
        <p class="subtitle">View your daily health data from Google Health</p>
        
        <!-- Date Picker -->
        <div class="date-picker-section">
            <label for="date-picker">📅 Select a date:</label>
            <input type="date" id="date-picker" />
            <button class="btn" id="fetch-btn" onclick="fetchHealthData()">Fetch Data</button>
            <span id="source-indicator"></span>
        </div>
        
        <!-- Content Area -->
        <div id="content-area">
            <div class="empty-state">
                <div class="empty-state-icon">📊</div>
                <p>Select a date and click "Fetch Data" to view your health metrics.</p>
            </div>
        </div>
        
        <!-- Navigation -->
        <div class="nav-footer">
            <a href="/dashboard" class="btn btn-secondary">← Back to Dashboard</a>
        </div>
    </div>
    
    <script>
        // Initialize date picker with today's date
        const datePicker = document.getElementById('date-picker');
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        datePicker.value = `${yyyy}-${mm}-${dd}`;
        
        // Auto-fetch on page load
        fetchHealthData();
        
        async function fetchHealthData() {
            const date = datePicker.value;
            if (!date) {
                alert('Please select a date');
                return;
            }
            
            const contentArea = document.getElementById('content-area');
            const fetchBtn = document.getElementById('fetch-btn');
            const sourceIndicator = document.getElementById('source-indicator');
            
            // Show loading state
            fetchBtn.disabled = true;
            sourceIndicator.innerHTML = '';
            contentArea.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Fetching health data for <strong>${date}</strong>...</p>
                    <p style="font-size: 0.875rem; color: #9ca3af; margin-top: 8px;">
                        This may take a moment if data needs to be fetched from Google Health API.
                    </p>
                </div>
            `;
            
            try {
                const response = await fetch(`/api/health-data/${date}`);
                
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.detail || `HTTP ${response.status}: ${response.statusText}`);
                }
                
                const result = await response.json();
                renderHealthData(result, date);
                
            } catch (error) {
                contentArea.innerHTML = `
                    <div class="error">
                        <strong>❌ Error:</strong> ${escapeHtml(error.message)}
                    </div>
                `;
            } finally {
                fetchBtn.disabled = false;
            }
        }
        
        function renderHealthData(result, date) {
            const contentArea = document.getElementById('content-area');
            const sourceIndicator = document.getElementById('source-indicator');
            const data = result.data;
            const source = result.source;
            
            // Show source badge
            const sourceLabel = source === 'database' ? '⚡ From Cache' : '🌐 From Google API';
            sourceIndicator.innerHTML = `<span class="source-badge ${source}">${sourceLabel}</span>`;
            
            // Check if data is empty (all zeros/nulls)
            const hasData = data.steps > 0 || data.calories > 0 || data.sleep_duration > 0 || 
                           (data.raw_heart_rate && data.raw_heart_rate.length > 0);
            
            if (!hasData) {
                contentArea.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">😴</div>
                        <p>No health data available for <strong>${date}</strong>.</p>
                        <p style="font-size: 0.875rem; color: #9ca3af; margin-top: 8px;">
                            The user may not have worn their device, or no data was recorded for this date.
                        </p>
                    </div>
                `;
                return;
            }
            
            contentArea.innerHTML = `
                <!-- Activity & Heart Rate -->
                <div class="data-grid">
                    <!-- Activity Card -->
                    <div class="data-section">
                        <h2>🏃 Activity</h2>
                        ${renderMetric('Steps', data.steps, 'steps')}
                        ${renderMetric('Calories', data.calories, 'kcal')}
                        ${renderMetric('Wear Time', formatMinutes(data.wear_time), '')}
                    </div>
                    
                    <!-- Heart Rate Card -->
                    <div class="data-section">
                        <h2>❤️ Heart Rate</h2>
                        ${renderMetric('Average HR', data.avg_hr, 'bpm')}
                        ${renderMetric('Max HR', data.max_hr, 'bpm')}
                        ${renderMetric('Resting HR', data.resting_hr, 'bpm')}
                        ${renderMetric('HR Samples', data.raw_heart_rate ? data.raw_heart_rate.length : 0, 'readings')}
                    </div>
                    
                    <!-- Sleep Card -->
                    <div class="data-section">
                        <h2>😴 Sleep</h2>
                        ${renderMetric('Duration', formatMinutes(data.sleep_duration), '')}
                        ${renderMetric('Deep Sleep', formatMinutes(data.deep_sleep), '')}
                        ${renderMetric('Light Sleep', formatMinutes(data.light_sleep), '')}
                        ${renderMetric('REM Sleep', formatMinutes(data.rem_sleep), '')}
                        ${renderMetric('Efficiency', data.sleep_efficiency !== null ? data.sleep_efficiency + '%' : null, '')}
                        ${data.sleep_start ? renderMetric('Sleep Start', formatTime(data.sleep_start), '') : ''}
                        ${data.sleep_end ? renderMetric('Sleep End', formatTime(data.sleep_end), '') : ''}
                    </div>
                </div>
                
                <!-- Raw Data (Collapsible) -->
                <details class="raw-section">
                    <summary>🔍 View Raw Heart Rate Data (${data.raw_heart_rate ? data.raw_heart_rate.length : 0} samples)</summary>
                    <pre>${escapeHtml(JSON.stringify(data.raw_heart_rate || [], null, 2))}</pre>
                </details>
                
                <details class="raw-section">
                    <summary>🔍 View Raw Sleep Data</summary>
                    <pre>${escapeHtml(JSON.stringify(data.raw_sleep || [], null, 2))}</pre>
                </details>
            `;
        }
        
        function renderMetric(label, value, unit) {
            const displayValue = value === null || value === undefined 
                ? '<span class="metric-value empty">No data</span>'
                : `<span class="metric-value">${value}${unit ? ' ' + unit : ''}</span>`;
            return `
                <div class="metric">
                    <span class="metric-label">${label}</span>
                    ${displayValue}
                </div>
            `;
        }
        
        function formatMinutes(minutes) {
            if (minutes === null || minutes === undefined) return null;
            if (minutes < 60) return `${minutes} min`;
            const h = Math.floor(minutes / 60);
            const m = minutes % 60;
            return m > 0 ? `${h}h ${m}m` : `${h}h`;
        }
        
        function formatTime(isoString) {
            if (!isoString) return null;
            try {
                const date = new Date(isoString);
                return date.toLocaleTimeString('en-US', { 
                    hour: '2-digit', 
                    minute: '2-digit',
                    hour12: false 
                });
            } catch {
                return isoString;
            }
        }
        
        function escapeHtml(text) {
            if (typeof text !== 'string') return text;
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
