<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connection Successful - Propsy Health</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        /* Success-specific styles (small additions not worth adding to main.css) */
        .success-icon {
            width: 80px;
            height: 80px;
            background: #22c55e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        .success-icon svg {
            width: 40px;
            height: 40px;
            color: white;
        }
        .id-card {
            background: #f8fafc;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }
        .id-card h3 {
            color: #666;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }
        .id-card p {
            color: #333;
            font-family: monospace;
            font-size: 0.9rem;
            word-break: break-all;
        }
        .page-gradient-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
    </style>
</head>
<body class="page-gradient page-gradient-success">
    <div class="container">
        <div class="card text-center">
            <div class="success-icon">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
            </div>
            
            <h1>Google Health Connected!</h1>
            <p class="subtitle">Your account has been successfully authenticated and tokens have been stored securely.</p>
            
            <div class="id-card">
                <h3>Legacy ID</h3>
                <p>{{ legacy_id }}</p>
            </div>
            
            <div class="id-card">
                <h3>Health ID</h3>
                <p>{{ health_id }}</p>
            </div>
            
            <a href="/dashboard" class="btn btn-primary">Continue to Dashboard →</a>
            
            <div class="footer">
                <p>🔐 Tokens stored in MongoDB</p>
                <p>Ready for Google Health API synchronization</p>
            </div>
        </div>
    </div>
</body>
</html>
