<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title | default("Error") }}</title>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="page-gradient-error">
    <div class="container">
        <div class="card text-center">
            <h1>{{ title }}</h1>
            <p class="subtitle">{{ message }}</p>
            
            {% if details %}
            <div class="error-box">
                <strong>Details:</strong><br>
                <code style="background: transparent; color: inherit; white-space: pre-wrap;">{{ details }}</code>
            </div>
            {% endif %}
            
            <div class="btn-group" style="justify-content: center;">
                <a href="/" class="btn btn-primary">Return to Home</a>
                <a href="/login" class="btn btn-secondary">Try Again</a>
            </div>
            
            <div class="footer">
                <p>If this error persists, please contact support.</p>
            </div>
        </div>
    </div>
</body>
</html>
