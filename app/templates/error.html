<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title | default("Error") }}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .error-icon {
            width: 80px;
            height: 80px;
            background: #ef4444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        .error-icon svg {
            width: 40px;
            height: 40px;
            color: white;
        }
        h1 {
            color: #333;
            margin-bottom: 16px;
            font-size: 1.5rem;
        }
        p {
            color: #666;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .error-details {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 16px;
            margin: 20px 0;
            text-align: left;
            font-family: monospace;
            font-size: 0.85rem;
            color: #991b1b;
            word-break: break-word;
        }
        .btn {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            margin-top: 8px;
            transition: background 0.2s;
        }
        .btn:hover { background: #556cd6; }
        .btn-secondary {
            background: #6b7280;
            margin-left: 8px;
        }
        .btn-secondary:hover { background: #4b5563; }
        .footer {
            margin-top: 32px;
            color: #999;
            font-size: 0.875rem;
        }
        @media (prefers-color-scheme: dark) {
            body { background: linear-gradient(135deg, #1f1f2e 0%, #2d1f2e 100%); }
            .container { background: #1e1e2e; }
            h1 { color: #fff; }
            p { color: #aaa; }
            .error-details { background: #3f2a2a; border-color: #7f3a3a; color: #fca5a5; }
            .footer { color: #666; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </div>
        
        <h1>{{ title }}</h1>
        <p>{{ message }}</p>
        
        {% if details %}
        <div class="error-details">{{ details }}</div>
        {% endif %}
        
        <a href="/" class="btn">Return to Home</a>
        <a href="/login" class="btn btn-secondary">Try Again</a>
        
        <div class="footer">
            <p>If this error persists, please contact support</p>
        </div>
    </div>
</body>
</html>
