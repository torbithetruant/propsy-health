version: '3.8'

services:
  # FastAPI Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: propsy-health-app
    ports:
      - "8080:8080"
    environment:
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SECRET_KEY=${SECRET_KEY}
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DB_NAME=propsy_health
      - BASE_URL=http://localhost:8080
      - REDIRECT_PATH=/oauth/callback
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DEBUG=true
    volumes:
      # Mount code for hot reload during development
      - ./app:/app/app
      - ./client_secret:/app/client_secret
    depends_on:
      - mongodb
    restart: unless-stopped
    networks:
      - propsy-network

  # MongoDB (for local development)
  mongodb:
    image: mongo:7.0
    container_name: propsy-health-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=propsy_health
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    restart: unless-stopped
    networks:
      - propsy-network

  # MongoDB Express (optional - web UI for MongoDB)
  mongo-express:
    image: mongo-express:1.0
    container_name: propsy-health-mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin123
    depends_on:
      - mongodb
    restart: unless-stopped
    networks:
      - propsy-network

volumes:
  mongodb_data:
  mongodb_config:

networks:
  propsy-network:
    driver: bridge